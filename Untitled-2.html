<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduStudentHub - PDF Résumés</title>
<style>
body{font-family:Arial;margin:0;background:#667eea;color:white;text-align:center;}
.section{display:none;padding:20px;}
.active{display:block;}
button{padding:8px 15px;border-radius:15px;border:none;margin:5px;cursor:pointer;}
.card{background:white;color:black;margin:10px;padding:10px;border-radius:10px;text-align:left;}
.bottom-nav{position:fixed;bottom:0;width:100%;background:white;display:flex;justify-content:space-around;}
.bottom-nav button{background:none;}
</style>
</head>
<body>

<h2>🔐 Connexion Étudiant</h2>
<input id="studentName" placeholder="Nom étudiant">
<button onclick="login()">Se connecter</button>

<div id="dashboard" class="section">
<h2>👋 Bienvenue, <span id="nameDisplay"></span> !</h2>

<div class="bottom-nav">
<button onclick="show('resumeSec')">📚 Résumés</button>
<button onclick="show('exSec')">📝 Exercices</button>
<button onclick="show('taskSec')">✅ Tâches</button>
<button onclick="show('statsSec')">📊 Stats</button>
<button onclick="logout()">🚪 Déconnexion</button>
</div>

<!-- RESUMES PDF -->
<div id="resumeSec" class="section active">
<h3>📚 Résumés PDF</h3>
<input type="file" id="pdfUpload" accept="application/pdf">
<input id="pdfTitle" placeholder="Titre du résumé">
<button onclick="addResumePDF()">Ajouter PDF</button>
<div id="rList"></div>
</div>

<!-- EXERCICES -->
<div id="exSec" class="section">
<h3>📝 Exercices</h3>
<input id="eTitle" placeholder="Exercice">
<input id="eProg" type="number" placeholder="%">
<button onclick="addEx()">Ajouter</button>
<div id="eList"></div>
</div>

<!-- TASKS -->
<div id="taskSec" class="section">
<h3>✅ Tâches / Planning</h3>
<input id="tText" placeholder="Tâche">
<input id="tDate" type="date">
<button onclick="addTask()">Ajouter</button>
<ul id="tList"></ul>
</div>

<!-- STATS -->
<div id="statsSec" class="section">
<h3>📊 Statistiques</h3>
<p id="globalProgress"></p>
</div>

<script>
// LOGIN
function login(){
  let name=studentName.value.trim();
  if(!name){alert("Nom requis"); return;}
  localStorage.setItem("studentName",name);
  nameDisplay.innerText=name;
  document.querySelector('h2').style.display='none';
  studentName.style.display='none';
  loginBtn.style.display='none';
  document.getElementById("dashboard").classList.add("active");
  display();
}

function logout(){
  localStorage.removeItem("studentName");
  location.reload();
}

function show(id){
  document.querySelectorAll("#dashboard .section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// ===== RESUMES PDF =====
let resumesPDF=JSON.parse(localStorage.getItem("resumesPDF"))||[];

function addResumePDF(){
  let file = document.getElementById("pdfUpload").files[0];
  let title = document.getElementById("pdfTitle").value;
  if(!file || !title){alert("Titre et fichier requis"); return;}
  
  let reader = new FileReader();
  reader.onload = function(e){
    resumesPDF.push({title:title,data:e.target.result,name:file.name});
    localStorage.setItem("resumesPDF",JSON.stringify(resumesPDF));
    display();
  }
  reader.readAsDataURL(file);
}

function delResumePDF(i){
  resumesPDF.splice(i,1);
  localStorage.setItem("resumesPDF",JSON.stringify(resumesPDF));
  display();
}

function display(){
  // RESUMES PDF
  rList.innerHTML="";
  resumesPDF.forEach((r,i)=>{
    rList.innerHTML+=`<div class="card">
      <h4>${r.title}</h4>
      <a href="${r.data}" download="${r.name}">⬇️ Télécharger</a>
      <button onclick="delResumePDF(${i})">❌ Supprimer</button>
      <iframe src="${r.data}" width="100%" height="200"></iframe>
    </div>`;
  });
}

if(localStorage.getItem("studentName")){
  nameDisplay.innerText=localStorage.getItem("studentName");
  document.querySelector('h2').style.display='none';
  studentName.style.display='none';
  document.getElementById("dashboard").classList.add("active");
  display();
}
</script>
</body>
</html>
