<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduStudentHub - Girly</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #f78da7;
  --secondary: #c39bd3;
  --success: #ffb347;
  --danger: #ff6b81;
}

body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: #fff;
  text-align: center;
  padding-bottom: 80px;
}

.section { display:none; }
.section.active { display:block; }

.card {
  background: rgba(255,255,255,0.15);
  color:#333;
  padding:15px;
  margin:10px;
  border-radius:15px;
}

button {
  border:none;
  border-radius:20px;
  padding:10px;
  cursor:pointer;
}

.btn-main { background:var(--success); color:#fff; }
.btn-delete { background:var(--danger); color:#fff; }

.bottom-nav {
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  display:flex;
  justify-content:space-around;
}

#msg {
  position: fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:var(--success);
  padding:10px;
  border-radius:10px;
  display:none;
}
</style>
</head>

<body>

<div id="auth-container">
<h2>🔐 EduStudentHub 🌸</h2>
<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">
<button class="btn-main" onclick="login()">Se connecter</button>
<button class="btn-main" onclick="register()">S’inscrire</button>
</div>

<div id="dashboard">

<h3 id="nameDisplay"></h3>

<div class="bottom-nav">
<button onclick="show('exSec')">📝</button>
<button onclick="show('doneExSec')">✔️</button>
<button onclick="show('chatSec')">💬</button>
</div>

<!-- EXERCICES -->
<div id="exSec" class="section active">
<h3>Exercices</h3>
<input id="eTitle">
<textarea id="eContent"></textarea>
<button class="btn-main" onclick="publish()">Publier</button>
<div id="eList"></div>
</div>

<!-- DONE -->
<div id="doneExSec" class="section">
<h3>Réalisés</h3>
<div id="doneList"></div>
</div>

<!-- CHAT -->
<div id="chatSec" class="section">
<h3>Chat</h3>

<div id="onlineUsers"></div>

<div id="chatBox" style="height:200px;overflow:auto;background:#fff;color:#000"></div>

<input id="chatInput">
<input type="file" id="imgInput">
<button onclick="sendMessage()">Envoyer</button>
</div>

</div>

<div id="msg"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app=initializeApp({
databaseURL:"https://edustudenthub-default-rtdb.europe-west1.firebasedatabase.app"
});

const db=getDatabase(app);
const auth=getAuth(app);

//////////////////////////////////////////////////
// MESSAGE
//////////////////////////////////////////////////
function showMessage(text){
const msg=document.getElementById("msg");
msg.innerText=text;
msg.style.display='block';
setTimeout(()=>msg.style.display='none',2000);
}

//////////////////////////////////////////////////
// AUTH
//////////////////////////////////////////////////
window.register=()=>{
createUserWithEmailAndPassword(auth,email.value,password.value);
};

window.login=()=>{
signInWithEmailAndPassword(auth,email.value,password.value);
};

onAuthStateChanged(auth,user=>{
if(user){
document.body.classList.add("logged-in");
nameDisplay.innerText=user.email;
renderDone();
}
});

//////////////////////////////////////////////////
// NAV
//////////////////////////////////////////////////
window.show=function(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
};

//////////////////////////////////////////////////
// PUBLISH
//////////////////////////////////////////////////
window.publish=function(){
push(ref(db,'shared/ex'),{
title:eTitle.value,
data:eContent.value,
uid:auth.currentUser.uid
});
};

//////////////////////////////////////////////////
// LIST
//////////////////////////////////////////////////
onValue(ref(db,'shared/ex'),snap=>{
const data=snap.val()||{};
eList.innerHTML="";
Object.keys(data).forEach(key=>{
eList.innerHTML+=`
<div class="card">
${data[key].title}
<button onclick="markDone('${key}')">✔️</button>
</div>`;
});
});

//////////////////////////////////////////////////
// DONE
//////////////////////////////////////////////////
window.markDone=function(id){
get(child(ref(db,'shared/ex'),id)).then(snap=>{
set(ref(db,'done/'+auth.currentUser.uid+'/'+id),snap.val());
});
};

function renderDone(){
onValue(ref(db,'done/'+auth.currentUser.uid),snap=>{
const data=snap.val()||{};
doneList.innerHTML="";
Object.keys(data).forEach(key=>{
doneList.innerHTML+=`
<div class="card">
${data[key].title}
<button onclick="deleteDone('${key}')">❌</button>
</div>`;
});
});
}

window.deleteDone=function(key){
remove(ref(db,'done/'+auth.currentUser.uid+'/'+key));
showMessage("Supprimé");
};

//////////////////////////////////////////////////
// CHAT
//////////////////////////////////////////////////
window.sendMessage=function(){
const file=imgInput.files[0];
const refMsg=ref(db,'chat/'+Date.now());

if(file){
const r=new FileReader();
r.onload=e=>{
set(refMsg,{image:e.target.result,uid:auth.currentUser.uid});
};
r.readAsDataURL(file);
}else{
set(refMsg,{text:chatInput.value,uid:auth.currentUser.uid});
}
chatInput.value="";
imgInput.value="";
};

onValue(ref(db,'chat'),snap=>{
const data=snap.val()||{};
chatBox.innerHTML="";
Object.keys(data).forEach(k=>{
const m=data[k];
const me=m.uid===auth.currentUser.uid;
chatBox.innerHTML+=`
<div style="background:${me?'pink':'#eee'}">
${m.text||''}
${m.image?`<img src="${m.image}" width="100">`:''}
${me?`<button onclick="deleteMsg('${k}')">❌</button>
<button onclick="editMsg('${k}')">✏️</button>`:''}
</div>`;
});
});

window.deleteMsg=k=>remove(ref(db,'chat/'+k));

window.editMsg=function(k){
const t=prompt("Modifier");
if(t) set(ref(db,'chat/'+k+'/text'),t);
};

//////////////////////////////////////////////////
// ONLINE
//////////////////////////////////////////////////
onAuthStateChanged(auth,user=>{
if(user){
set(ref(db,'status/'+user.uid),{online:true});
}
});

onValue(ref(db,'status'),snap=>{
const d=snap.val()||{};
onlineUsers.innerHTML="";
Object.keys(d).forEach(u=>{
if(d[u].online) onlineUsers.innerHTML+="🟢 user<br>";
});
});

</script>
</body>
</html>
