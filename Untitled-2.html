<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduStudentHub - Girly</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #f78da7;
  --secondary: #c39bd3;
  --success: #ffb347;
  --danger: #ff6b81;
  --dark: #5d4e6d;
}
body {
  font-family: 'Poppins', 'Segoe UI', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: #fff;
  text-align: center;
  min-height: 100vh;
  padding-bottom: 80px;
}
#auth-container {
  background: #fff;
  color: #333;
  padding: 30px;
  border-radius: 30px;
  margin: 50px auto;
  width: 85%;
  max-width: 400px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}
#dashboard { display:none; }
.logged-in #dashboard { display:block; }
.logged-in #auth-container { display:none; }

input, textarea {
  padding: 12px;
  border-radius: 15px;
  border: 1px solid #ddd;
  margin: 8px 0;
  width: 90%;
  font-size: 16px;
  display: block;
  margin-left: auto;
  margin-right: auto;
}
button {
  padding: 14px 30px;
  border-radius: 30px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
  margin: 10px 5px;
  font-family: 'Poppins', sans-serif;
}
.btn-main {
  background: var(--success);
  color: white;
  width: 95%;
  box-shadow: 0 5px 15px rgba(255, 180, 180, 0.4);
}
.btn-delete {
  background: var(--danger);
  color: white;
  padding: 6px 14px;
  font-size: 0.85em;
  border-radius: 10px;
}
.card {
  background: rgba(255, 255, 255, 0.15);
  color: #333;
  margin: 15px 0;
  padding: 20px;
  border-radius: 20px;
  text-align: left;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  border-left: 5px solid var(--primary);
}
.btn-open {
  display: inline-block;
  margin-top: 10px;
  background: var(--primary);
  color: white;
  font-weight: bold;
  text-decoration: none;
  padding: 8px 22px;
  border-radius: 25px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}
.bottom-nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #fff;
  display: flex;
  justify-content: space-around;
  padding: 12px 0;
  box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
  z-index: 100;
}
.bottom-nav button {
  background: none;
  color: var(--primary);
  margin: 0;
  padding: 5px;
  font-size: 1.6em;
}
.section { display: none; }
.section.active { display: block; }

#msg {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--success);
  color: white;
  padding: 12px 24px;
  border-radius: 20px;
  display: none;
  z-index: 1000;
  font-weight: bold;
}

.counter {
  background: rgba(255,255,255,0.2);
  padding: 6px 12px;
  border-radius: 15px;
  margin: 8px;
  font-weight: bold;
}
.chat-box {
  max-height: 300px;
  overflow-y: auto;
  background: rgba(255,255,255,0.1);
  padding: 10px;
  border-radius: 15px;
}
.chat-message {
  margin: 10px 0;
  padding: 8px 12px;
  background: rgba(255,255,255,0.3);
  border-radius: 12px;
  position: relative;
}
.chat-message small { font-size: 0.75em; display:block; color:#333; }
.chat-actions { position: absolute; top: 5px; right: 10px; }
.online-user { font-weight:bold; color:#0f0; }
</style>
</head>
<body>

<div id="auth-container">
  <h2>🔐 EduStudentHub 🌸</h2>
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">
  <button class="btn-main" onclick="login()">Se connecter</button>
  <button class="btn-main" onclick="register()">S’inscrire</button>
</div>

<div id="dashboard" class="container">
  <h2>Bonjour, <span id="nameDisplay"></span> 💖</h2>
  <button class="btn-main" style="background:#ff6b81;margin-bottom:10px;" onclick="confirmLogout()">Se déconnecter 🚪</button>

  <div class="counter">
    Résumés 🌸 : <span id="pdfCount">0</span> |
    Exercices 📝 : <span id="exCount">0</span> |
    Tâches 🦋 : <span id="taskCount">0</span>
  </div>

  <div class="bottom-nav">
    <button onclick="show('resumeSec')">📚🌸</button>
    <button onclick="show('exSec')">📝💖</button>
    <button onclick="show('taskSec')">🗂🦋</button>
    <button onclick="show('doneExSec')">✔️🌷</button>
    <button onclick="show('doneTaskSec')">✅🦋</button>
    <button onclick="show('chatSec')">💬🟢</button>
    <button onclick="confirmLogout()" style="color:var(--danger)">🚪</button>
  </div>

  <!-- Sections -->
  <div id="resumeSec" class="section active">
    <h3>📚🌸 Partager un résumé</h3>
    <div class="card" style="background:rgba(255,255,255,0.1);border:1px dashed white;">
      <input id="cTitle" placeholder="Nom du cours">
      <input id="cUrl" placeholder="Lien (http://...)">
      <button class="btn-main" onclick="publish('pdfs','cTitle','cUrl')">Publier 💖</button>
    </div>
    <div id="rList"></div>
  </div>

  <div id="exSec" class="section">
    <h3>📝💖 Exercices et textes</h3>
    <div class="card" style="background:rgba(255,255,255,0.1);border:1px dashed white;">
      <input id="eTitle" placeholder="Titre">
      <textarea id="eContent" placeholder="Énoncé ou lien..."></textarea>
      <button class="btn-main" onclick="publish('ex','eTitle','eContent')">Publier 💖</button>
    </div>
    <div id="eList"></div>
  </div>

  <div id="taskSec" class="section">
    <h3>🗂🦋 Tâches</h3>
    <div class="card" style="background:rgba(255,255,255,0.1);border:1px dashed white;">
      <input id="tTitle" placeholder="Titre">
      <textarea id="tContent" placeholder="Description..."></textarea>
      <button class="btn-main" onclick="publish('tasks','tTitle','tContent')">Publier 💖</button>
    </div>
    <div id="tList"></div>
  </div>

  <div id="doneExSec" class="section">
    <h3>✅🌷 Exercices réalisés</h3>
    <div id="doneList"></div>
  </div>

  <div id="doneTaskSec" class="section">
    <h3>✅🦋 Tâches réalisées</h3>
    <div id="doneTaskList"></div>
  </div>

  <div id="chatSec" class="section">
    <h3>💬🟢 Chat en ligne</h3>
    <div class="chat-box" id="chatBox"></div>
    <input id="chatInput" placeholder="Écrire un message...">
    <input id="chatImage" type="file" accept="image/*">
    <button class="btn-main" onclick="sendMessage()">Envoyer 💖</button>
    <button class="btn-delete" onclick="clearChat()">Vider le chat 🗑️</button>
    <div><strong>Utilisateurs en ligne :</strong> <span id="onlineUsers"></span></div>
  </div>
</div>

<div id="msg"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, set, get, child, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey:"AIzaSyBNGA_rCPQRErmQxT4tkvCT0R3DGIPcV-Y",
  authDomain:"edustudenthub.firebaseapp.com",
  projectId:"edustudenthub",
  databaseURL:"https://edustudenthub-default-rtdb.europe-west1.firebasedatabase.app",
  appId:"1:638666895614:web:b566af4aacf05e70fdf5af"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

// ----- Message -----
function showMessage(text, success=true){
  const msg=document.getElementById("msg");
  msg.innerText=text;
  msg.style.background=success?'var(--success)':'var(--danger)';
  msg.style.display='block';
  setTimeout(()=>msg.style.display='none',2500);
}

// ----- Auth -----
window.register = function(){
  const email=document.getElementById("email").value.trim();
  const password=document.getElementById("password").value.trim();
  if(!email||!password) return showMessage("Champs vides !",false);
  createUserWithEmailAndPassword(auth,email,password)
    .then(u=>showMessage("Compte créé !"))
    .catch(e=>showMessage(e.message,false));
};

window.login = function(){
  const email=document.getElementById("email").value.trim();
  const password=document.getElementById("password").value.trim();
  if(!email||!password) return showMessage("Champs vides !",false);
  signInWithEmailAndPassword(auth,email,password)
    .catch(e=>showMessage(e.message,false));
};

window.confirmLogout = function(){
  if(confirm("Voulez-vous vraiment vous déconnecter ?")){
    signOut(auth).then(()=>{showMessage("Déconnecté !"); location.reload();})
    .catch(err=>showMessage(err.message,false));
  }
};

// ----- Sections -----
window.show = function(id){
  const sections = document.querySelectorAll(".section");
  sections.forEach(s=>s.classList.remove("active"));
  const target = document.getElementById(id);
  if(target) target.classList.add("active");
};

// ----- Publish -----
window.publish=function(path,tId,cId){
  const title=document.getElementById(tId).value.trim();
  const content=document.getElementById(cId).value.trim();
  if(!title||!content) return showMessage("Champs vides !",false);
  const dataRef=ref(db,`shared/${path}`);
  const newItemRef=push(dataRef);
  set(newItemRef,{
    title:title,
    data:content,
    user:auth.currentUser.uid,
    email:auth.currentUser.email,
    time:new Date().toLocaleTimeString()
  }).then(()=>{
    document.getElementById(tId).value="";
    document.getElementById(cId).value="";
    showMessage("Partagé !");
  }).catch(err=>showMessage(err.message,false));
};

// ----- Supprimer un élément partagé -----
window.deleteItem = function(path, id){
  if(confirm("Supprimer ?")){
    remove(ref(db, `shared/${path}/${id}`))
      .then(() => { showMessage("Supprimé !"); renderSharedContent(); })
      .catch(err => showMessage(err.message,false));
  }
};

// ----- Exercices et tâches réalisés -----
window.markDone = function(exId){
  const doneRef = ref(db, `done/${auth.currentUser.uid}/${exId}`);
  get(child(ref(db,'shared/ex'), exId)).then(snapshot=>{
    if(snapshot.exists()){
      set(doneRef, snapshot.val()).then(()=>{ showMessage("Exercice marqué ✅"); renderDoneEx(); });
    }
  });
};
window.removeDone = function(id){
  if(confirm("Supprimer l'exercice réalisé ?")){
    remove(ref(db, `done/${auth.currentUser.uid}/${id}`))
    .then(()=>{ showMessage("Exercice supprimé !"); renderDoneEx(); })
    .catch(err => showMessage(err.message,false));
  }
};
function renderDoneEx(){
  const div=document.getElementById("doneList");
  get(ref(db,`done/${auth.currentUser.uid}`)).then(snapshot=>{
    const data=snapshot.val()||{};
    div.innerHTML="";
    Object.keys(data).forEach(key=>{
      const item=data[key];
      const isLink=item.data.startsWith("http");
      const action=isLink?`<a href="${item.data}" target="_blank" class="btn-open">Ouvrir ↗</a>`:`<p style="background:#eee;padding:10px;border-radius:8px;color:#333;">${item.data}</p>`;
      div.innerHTML+=`<div class="card">
        <h4>${item.title}</h4>
        <small>${item.time||''}</small>
        <div>${action}</div>
        <div style="text-align:right">
          <button class="btn-delete" onclick="removeDone('${key}')">Supprimer</button>
        </div>
      </div>`;
    });
  });
}

window.markTaskDone = function(taskId){
  const doneRef = ref(db, `doneTasks/${auth.currentUser.uid}/${taskId}`);
  get(child(ref(db,'shared/tasks'), taskId)).then(snapshot=>{
    if(snapshot.exists()){
      set(doneRef, snapshot.val()).then(()=>{ showMessage("Tâche marquée ✅"); renderDoneTasks(); });
    }
  });
};
window.removeDoneTask = function(taskId){
  if(confirm("Supprimer la tâche réalisée ?")){
    remove(ref(db, `doneTasks/${auth.currentUser.uid}/${taskId}`))
    .then(()=>{ showMessage("Tâche supprimée !"); renderDoneTasks(); })
    .catch(err => showMessage(err.message,false));
  }
};
function renderDoneTasks(){
  const div = document.getElementById("doneTaskList");
  get(ref(db,`doneTasks/${auth.currentUser.uid}`)).then(snapshot=>{
    const data = snapshot.val() || {};
    div.innerHTML = "";
    Object.keys(data).forEach(key=>{
      const item = data[key];
      const isLink=item.data.startsWith("http");
      const action=isLink?`<a href="${item.data}" target="_blank" class="btn-open">Ouvrir ↗</a>`:`<p style="background:#eee;padding:10px;border-radius:8px;color:#333;">${item.data}</p>`;
      div.innerHTML += `<div class="card">
        <h4>${item.title}</h4>
        <small>${item.time||''}</small>
        <div>${action}</div>
        <div style="text-align:right">
          <button class="btn-delete" onclick="removeDoneTask('${key}')">Supprimer</button>
        </div>
      </div>`;
    });
  });
}

// ----- Récupérer et afficher les contenus partagés -----
function renderSharedContent(){
  const pdfList = document.getElementById("rList");
  const exList = document.getElementById("eList");
  const tList = document.getElementById("tList");

  onValue(ref(db,'shared'), snapshot => {
    const data = snapshot.val() || {};
    
    // PDFs / résumés
    pdfList.innerHTML = '';
    const pdfs = data.pdfs || {};
    Object.keys(pdfs).forEach(k=>{
      const p = pdfs[k];
      const action = p.data.startsWith("http")?`<a href="${p.data}" target="_blank" class="btn-open">Ouvrir ↗</a>`:`<p>${p.data}</p>`;
      pdfList.innerHTML += `<div class="card"><strong>${p.title}</strong><br>${action}${p.user===auth.currentUser?.uid?`<button class="btn-delete" onclick="deleteItem('pdfs','${k}')">Supprimer</button>`:''}</div>`;
    });

    // Exercices
    exList.innerHTML = '';
    const exs = data.ex || {};
    Object.keys(exs).forEach(k=>{
      const p = exs[k];
      const action = p.data.startsWith("http")?`<a href="${p.data}" target="_blank" class="btn-open">Ouvrir ↗</a>`:`<p>${p.data}</p>`;
      exList.innerHTML += `<div class="card"><strong>${p.title}</strong><br>${action}
      <button class="btn-main" onclick="markDone('${k}')">✅ Réaliser</button>
      ${p.user===auth.currentUser?.uid?`<button class="btn-delete" onclick="deleteItem('ex','${k}')">Supprimer</button>`:''}</div>`;
    });

    // Tâches
    tList.innerHTML = '';
    const tasks = data.tasks || {};
    Object.keys(tasks).forEach(k=>{
      const p = tasks[k];
      const action = p.data.startsWith("http")?`<a href="${p.data}" target="_blank" class="btn-open">Ouvrir ↗</a>`:`<p>${p.data}</p>`;
      tList.innerHTML += `<div class="card"><strong>${p.title}</strong><br>${action}
      <button class="btn-main" onclick="markTaskDone('${k}')">✅ Réaliser</button>
      ${p.user===auth.currentUser?.uid?`<button class="btn-delete" onclick="deleteItem('tasks','${k}')">Supprimer</button>`:''}</div>`;
    });

    // Mettre à jour compteur
    document.getElementById("pdfCount").innerText = Object.keys(pdfs).length;
    document.getElementById("exCount").innerText = Object.keys(exs).length;
    document.getElementById("taskCount").innerText = Object.keys(tasks).length;
  });
}

// ----- Chat -----
function linkify(text){
  const urlRegex = /(https?:\/\/[^\s]+)/g;
  return text.replace(urlRegex, url=>`<a href="${url}" target="_blank">${url}</a>`);
}

window.sendMessage = function(){
  const msgInput = document.getElementById("chatInput");
  const text = msgInput.value.trim();
  if(!text) return;
  push(ref(db,'chat'), {
    uid: auth.currentUser.uid,
    user: auth.currentUser.email,
    text: text,
    time: new Date().toLocaleTimeString()
  });
  msgInput.value = '';
};

function renderChat(){
  const chatBox = document.getElementById("chatBox");
  onValue(ref(db,'chat'), snapshot=>{
    const data = snapshot.val()||{};
    chatBox.innerHTML='';
    Object.keys(data).forEach(k=>{
      const m = data[k];
      const isOwner = m.uid===auth.currentUser.uid;
      chatBox.innerHTML+=`<div class="chat-message">
        <strong>${m.user}</strong> <small>${m.time}</small><br>
        ${linkify(m.text)}
      </div>`;
    });
    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

// ----- Online users -----
function updateOnlineUsers(){
  onValue(ref(db,'chat'), snapshot=>{
    const data=snapshot.val()||{};
    const users = [...new Set(Object.values(data).map(m=>m.user))];
    document.getElementById("onlineUsers").innerText = users.join(', ');
  });
}

// ----- Auth State -----
onAuthStateChanged(auth,user=>{
  if(user){
    document.body.classList.add("logged-in");
    document.getElementById("nameDisplay").innerText = user.email;
    renderSharedContent();
    renderDoneEx();
    renderDoneTasks();
    renderChat();
    updateOnlineUsers();
  } else {
    document.body.classList.remove("logged-in");
  }
});

</script>
</body>
</html>
