<style>
:root {
  --primary: #f78da7;
  --secondary: #c39bd3;
  --success: #ffb347;
  --danger: #ff6b81;
  --dark: #5d4e6d;
}
body {
  font-family: 'Poppins', 'Segoe UI', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: #fff;
  text-align: center;
  min-height: 100vh;
  padding-bottom: 80px;
}
#auth-container {
  background: #fff;
  color: #333;
  padding: 30px;
  border-radius: 30px;
  margin: 50px auto;
  width: 85%;
  max-width: 400px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}
#dashboard { display:none; }
.logged-in #dashboard { display:block; }
.logged-in #auth-container { display:none; }
input, textarea {
  padding: 12px;
  border-radius: 15px;
  border: 1px solid #ddd;
  margin: 8px 0;
  width: 90%;
  font-size: 16px;
  display: block;
  margin-left: auto;
  margin-right: auto;
}
button {
  padding: 14px 30px;
  border-radius: 30px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
  margin: 10px 5px;
  font-family: 'Poppins', sans-serif;
}
.btn-main {
  background: var(--success);
  color: white;
  width: 95%;
  box-shadow: 0 5px 15px rgba(255, 180, 180, 0.4);
}
.btn-delete {
  background: var(--danger);
  color: white;
  padding: 6px 14px;
  font-size: 0.85em;
  border-radius: 10px;
}
.card {
  background: rgba(255, 255, 255, 0.15);
  color: #333;
  margin: 15px 0;
  padding: 20px;
  border-radius: 20px;
  text-align: left;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);

}
