<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduStudentHub</title>

<style>
body{
  font-family: 'Segoe UI', sans-serif;
  margin:0;
  background: linear-gradient(135deg,#667eea,#764ba2);
  color:white;
  text-align:center;
}
.section{display:none;padding:20px;}
.active{display:block;}

.card{
  background:white;
  color:black;
  margin:10px;
  padding:15px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

button{
  padding:8px 15px;
  border:none;
  border-radius:10px;
  margin:5px;
  cursor:pointer;
  background:#667eea;
  color:white;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
}

input,textarea,select{
  padding:5px;
  margin:5px;
  border-radius:5px;
  border:none;
}
</style>
</head>

<body>

<h2>🔐 Connexion</h2>
<input id="studentName" placeholder="Nom">
<input id="studentPass" type="password" placeholder="Mot de passe">
<button onclick="login()">Entrer</button>

<div id="dashboard">

<h2>👋 <span id="nameDisplay"></span></h2>

<div class="bottom-nav">
<button onclick="show('resumeSec')">📚</button>
<button onclick="show('exSec')">📝</button>
<button onclick="show('taskSec')">✅</button>
<button onclick="show('statsSec')">📊</button>
<button onclick="logout()">🚪</button>
</div>

<!-- RESUMES -->
<div id="resumeSec" class="section active">
<h3>📚 Résumés</h3>

<input type="file" id="rFile">
<input id="rTitle" placeholder="Titre">
<button onclick="addResume()">Ajouter</button>

<div id="rList"></div>
</div>

<!-- EXERCICES -->
<div id="exSec" class="section">
<h3>📝 Exercices</h3>

<input id="searchEx" placeholder="🔍 rechercher" onkeyup="searchExFunc()">

<select id="exType">
<option value="txt">Texte</option>
<option value="file">Fichier</option>
</select>

<input id="eTitle" placeholder="Titre">
<textarea id="eText"></textarea>
<input type="file" id="eFile">

<button onclick="addEx()">Ajouter</button>

<button onclick="filterMine()">📁 Mes fichiers</button>
<button onclick="displayEx()">🌍 Tous</button>

<div id="eList"></div>
</div>

<!-- TASK -->
<div id="taskSec" class="section">
<h3>✅ Tâches</h3>
<input id="tText">
<input id="tDate" type="date">
<button onclick="addTask()">Ajouter</button>
<ul id="tList"></ul>
</div>

<!-- STATS -->
<div id="statsSec" class="section">
<h3>📊 Stats</h3>

<p>Mes exercices: <span id="myExCount"></span></p>
<p>Réalisés: <span id="myDone"></span></p>

<p>Total exercices: <span id="globalEx"></span></p>
<p>Total tâches: <span id="globalTasks"></span></p>
<p>Total résumés: <span id="globalRes"></span></p>

<div style="background:#ddd;border-radius:20px;width:80%;margin:auto;">
<div id="bar" style="height:20px;background:#00ff99;width:0%;border-radius:20px;"></div>
</div>
<p id="progressText"></p>

</div>

</div>

<script>

// DATA
let users = JSON.parse(localStorage.getItem("users")) || {};
let shared = JSON.parse(localStorage.getItem("shared")) || {ex:[],tasks:[],resumes:[]};
let currentUser=null;

// LOGIN
function login(){
let n=studentName.value.trim();
let p=studentPass.value;

if(!n||!p) return alert("remplir");

if(!users[n]) users[n]={pass:p,myEx:[],done:[],tasks:[]};

if(users[n].pass!==p) return alert("wrong");

currentUser=n;
localStorage.setItem("currentUser",n);
displayAll();
}

function logout(){localStorage.clear();location.reload();}

function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// ===== RESUMES =====
function addResume(){
let file = rFile.files[0];
let title = rTitle.value;

if(!file || !title) return alert("remplir");

let reader = new FileReader();
reader.onload = e=>{
shared.resumes.push({
title,
data:e.target.result,
type:file.type,
user:currentUser
});
save();
displayResumes();
}
reader.readAsDataURL(file);

rTitle.value="";
rFile.value="";
}

function displayResumes(){
rList.innerHTML="";

shared.resumes.forEach((r,i)=>{

let preview="";

if(r.type.startsWith("image")){
preview += `<img src="${r.data}" width="100%">`;
}
else if(r.type==="application/pdf"){
preview += `<iframe src="${r.data}" width="100%" height="200"></iframe>`;
}

preview += `<button onclick="openFile('resume',${i})">📂 Ouvrir</button>`;

rList.innerHTML+=`
<div class="card">
<h4>${r.title} (${r.user})</h4>
${preview}
<button onclick="delResume(${i})">❌</button>
</div>`;
});
}

function delResume(i){
shared.resumes.splice(i,1);
save();
displayResumes();
}

// ===== EXERCICES =====
function addEx(){
let type=exType.value;
let title=eTitle.value;
let text=eText.value;
let file=eFile.files[0];

if(!title) return alert("titre");

if(type==="file"){
let reader=new FileReader();
reader.onload=e=>{
shared.ex.push({
title,
type:"file",
data:e.target.result,
fileType:file.type,
user:currentUser
});
save();
displayEx();
};
reader.readAsDataURL(file);
}
else{
shared.ex.push({title,type:"txt",data:text,user:currentUser});
save();
displayEx();
}

users[currentUser].myEx.push(title);
save();
displayStats();
}

function displayEx(){
eList.innerHTML="";
shared.ex.forEach((ex,i)=>{

let preview="";

if(ex.type==="file"){
if(ex.fileType.startsWith("image")){
preview+=`<img src="${ex.data}" width="100%">`;
}
else if(ex.fileType==="application/pdf"){
preview+=`<iframe src="${ex.data}" width="100%" height="200"></iframe>`;
}
preview+=`<button onclick="openFile('ex',${i})">📂 ouvrir</button>`;
}
else{
preview+=`<p>${ex.data}</p>`;
}

let doneBtn = users[currentUser].done.includes(i) ? "✔" :
`<button onclick="markDone(${i})">✅</button>`;

eList.innerHTML+=`
<div class="card">
<h4>${ex.title} (${ex.user})</h4>
${preview}
${doneBtn}
<button onclick="delEx(${i})">❌</button>
</div>`;
});
}

function delEx(i){
shared.ex.splice(i,1);
save();
displayEx();
}

// ===== OUVERTURE AVEC CACHE =====
function openFile(type,i){
let f;

if(type==="resume") f=shared.resumes[i];
else f=shared.ex[i];

// 🔥 déjà ouvert → pas de re-download
if(f.url){
window.open(f.url);
return;
}

// 🔄 créer une seule fois
let b=atob(f.data.split(',')[1]);
let arr=new Uint8Array(b.length);

for(let j=0;j<b.length;j++){
arr[j]=b.charCodeAt(j);
}

let blob=new Blob([arr],{type:f.type || f.fileType});
let url=URL.createObjectURL(blob);

// stocker
f.url = url;
save();

window.open(url);
}

// ===== DONE =====
function markDone(i){
users[currentUser].done.push(i);
save();
displayEx();
displayStats();
}

// ===== TASK =====
function addTask(){
let t=tText.value;
let d=tDate.value;

shared.tasks.push({t,d,user:currentUser});
users[currentUser].tasks.push(t);

save();
displayTasks();
displayStats();
}

function displayTasks(){
tList.innerHTML="";
shared.tasks.forEach((t,i)=>{
tList.innerHTML+=`<li>${t.d} ${t.t} (${t.user}) <button onclick="delTask(${i})">❌</button></li>`;
});
}

function delTask(i){
shared.tasks.splice(i,1);
save();
displayTasks();
}

// ===== SEARCH =====
function searchExFunc(){
let val=document.getElementById("searchEx").value.toLowerCase();
document.querySelectorAll("#eList .card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(val)?"block":"none";
});
}

// ===== FILTER =====
function filterMine(){
eList.innerHTML="";
shared.ex.forEach((ex,i)=>{
if(ex.user===currentUser){
eList.innerHTML+=`<div class="card"><h4>${ex.title}</h4></div>`;
}
});
}

// ===== STATS =====
function displayStats(){
myExCount.innerText=users[currentUser].myEx.length;
myDone.innerText=users[currentUser].done.length;
globalEx.innerText=shared.ex.length;
globalTasks.innerText=shared.tasks.length;
globalRes.innerText=shared.resumes.length;

let p=Math.round((users[currentUser].done.length/(shared.ex.length||1))*100);
bar.style.width=p+"%";
progressText.innerText=p+"% terminé";
}

// SAVE
function save(){
localStorage.setItem("users",JSON.stringify(users));
localStorage.setItem("shared",JSON.stringify(shared));
}

// INIT
function displayAll(){
nameDisplay.innerText=currentUser;
document.querySelector('h2').style.display='none';
studentName.style.display='none';
studentPass.style.display='none';

displayResumes();
displayEx();
displayTasks();
displayStats();
}

if(localStorage.getItem("currentUser")){
currentUser=localStorage.getItem("currentUser");
displayAll();
}

</script>

</body>
</html>
