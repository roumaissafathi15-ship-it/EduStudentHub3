<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduStudentHub - Complet</title>
<style>
:root { --primary:#667eea; --secondary:#764ba2; --success:#4caf50; --danger:#ff4d4d; --dark:#2d3436; }
body { font-family:'Segoe UI',sans-serif; margin:0; background:linear-gradient(135deg,var(--primary),var(--secondary)); color:white; text-align:center; min-height:100vh; padding-bottom:80px;}
.container{max-width:800px;margin:auto;padding:20px;}
#auth-container{background:white;color:#333;padding:30px;border-radius:20px;margin:50px auto;width:85%;max-width:400px;box-shadow:0 15px 35px rgba(0,0,0,0.3);}
#dashboard{display:none;}
.logged-in #dashboard{display:block;}
.logged-in #auth-container{display:none;}
input,textarea{padding:12px;border-radius:10px;border:1px solid #ddd;margin:8px 0;width:90%;font-size:16px;display:block;margin-left:auto;margin-right:auto;}
button{padding:12px 25px;border-radius:25px;border:none;cursor:pointer;font-weight:bold;transition:0.3s;margin:10px 5px;}
.btn-main{background:var(--success);color:white;width:95%;}
.btn-delete{background:var(--danger);color:white;padding:5px 12px;font-size:0.8em;border-radius:5px;}
.card{background:white;color:#333;margin:15px 0;padding:20px;border-radius:15px;text-align:left;box-shadow:0 5px 15px rgba(0,0,0,0.1);border-left:5px solid var(--primary);}
.btn-open{display:inline-block;margin-top:10px;background:var(--primary);color:white;font-weight:bold;text-decoration:none;padding:8px 20px;border-radius:20px;}
.bottom-nav{position:fixed;bottom:0;width:100%;background:white;display:flex;justify-content:space-around;padding:10px 0;box-shadow:0 -5px 15px rgba(0,0,0,0.1);z-index:100;}
.bottom-nav button{background:none;color:var(--primary);margin:0;padding:5px;font-size:1.5em;}
.section{display:none;}
.section.active{display:block;}
#msg{position:fixed;top:10px;left:50%;transform:translateX(-50%);background:var(--success);color:white;padding:10px 20px;border-radius:10px;display:none;z-index:1000;}
.counter{background:rgba(0,0,0,0.2);padding:5px 10px;border-radius:10px;margin:5px;}
</style>
</head>
<body>

<div id="auth-container">
<h2>🔐 EduStudentHub</h2>
<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">
<button class="btn-main" onclick="login()">Se connecter</button>
<button class="btn-main" onclick="register()">S’inscrire</button>
</div>

<div id="dashboard" class="container">
<h2>Bonjour, <span id="nameDisplay"></span> !</h2>
<button class="btn-main" style="background:#ff4d4d;margin-bottom:10px;" onclick="confirmLogout()">Se déconnecter</button>

<div class="counter">
Résumés partagés : <span id="pdfCount">0</span> | Exercices partagés : <span id="exCount">0</span> | Tâches partagées : <span id="taskCount">0</span>
</div>

<div class="bottom-nav">
<button onclick="show('resumeSec')">📚 Résumés</button>
<button onclick="show('exSec')">📝 Exercices</button>
<button onclick="show('taskSec')">🗂 Tâches</button>
<button onclick="show('doneExSec')">✔️ Réalisés</button>
<button onclick="confirmLogout()" style="color:var(--danger)">🚪</button>
</div>

<!-- Résumés -->
<div id="resumeSec" class="section active">
<h3>📚 Partager un lien (Drive/PDF)</h3>
<div class="card" style="background:rgba(255,255,255,0.1);border:1px dashed white;">
<input id="cTitle" placeholder="Nom du cours">
<input id="cUrl" placeholder="Lien (http://...)">
<button class="btn-main" onclick="publish('pdfs','cTitle','cUrl')">Publier pour la classe</button>
</div>
<div id="rList"></div>
</div>

<!-- Exercices -->
<div id="exSec" class="section">
<h3>📝 Exercices et Textes</h3>
<div class="card" style="background:rgba(255,255,255,0.1);border:1px dashed white;">
<input id="eTitle" placeholder="Titre">
<textarea id="eContent" placeholder="Énoncé ou lien..."></textarea>
<button class="btn-main" onclick="publish('ex','eTitle','eContent')">Publier</button>
</div>
<div id="eList"></div>
</div>

<!-- Tâches -->
<div id="taskSec" class="section">
<h3>🗂 Tâches</h3>
<div class="card" style="background:rgba(255,255,255,0.1);border:1px dashed white;">
<input id="tTitle" placeholder="Titre">
<textarea id="tContent" placeholder="Description..."></textarea>
<button class="btn-main" onclick="publish('tasks','tTitle','tContent')">Publier</button>
</div>
<div id="tList"></div>
</div>

<!-- Exercices réalisés -->
<div id="doneExSec" class="section">
<h3>✅ Exercices réalisés</h3>
<div id="doneList"></div>
</div>

</div>

<div id="msg"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// Config Firebase
const firebaseConfig = {
apiKey:"AIzaSyBNGA_rCPQRErmQxT4tkvCT0R3DGIPcV-Y",
authDomain:"edustudenthub.firebaseapp.com",
projectId:"edustudenthub",
databaseURL:"https://edustudenthub-default-rtdb.europe-west1.firebasedatabase.app",
appId:"1:638666895614:web:b566af4aacf05e70fdf5af"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

// Message
function showMessage(text, success=true){
const msg=document.getElementById("msg");
msg.innerText=text;
msg.style.background=success?'var(--success)':'var(--danger)';
msg.style.display='block';
setTimeout(()=>msg.style.display='none',2500);
}

// Auth
window.register = function(){
const email=document.getElementById("email").value.trim();
const password=document.getElementById("password").value.trim();
if(!email||!password) return showMessage("Champs vides !",false);
createUserWithEmailAndPassword(auth,email,password).then(u=>showMessage("Compte créé !")).catch(e=>showMessage(e.message,false));
};

window.login = function(){
const email=document.getElementById("email").value.trim();
const password=document.getElementById("password").value.trim();
if(!email||!password) return showMessage("Champs vides !",false);
signInWithEmailAndPassword(auth,email,password).then(u=>{}).catch(e=>showMessage(e.message,false));
};

// Déconnexion
window.confirmLogout = function(){
if(confirm("Voulez-vous vraiment vous déconnecter ?")){
signOut(auth).then(()=>{showMessage("Déconnecté !"); location.reload();}).catch(err=>showMessage(err.message,false));
}
};

// Surveille l'état
onAuthStateChanged(auth,user=>{
if(user){
document.body.classList.add("logged-in");
document.getElementById("nameDisplay").innerText=user.email;

// Écoute globale
onValue(ref(db,'shared'),snapshot=>{
const data=snapshot.val()||{pdfs:{},ex:{},tasks:{}};
renderList('rList',data.pdfs,'pdfs');
renderList('eList',data.ex,'ex');
renderList('tList',data.tasks,'tasks');
// Compteurs
document.getElementById("pdfCount").innerText=Object.keys(data.pdfs||{}).filter(k=>data.pdfs[k].user===user.uid).length;
document.getElementById("exCount").innerText=Object.keys(data.ex||{}).filter(k=>data.ex[k].user===user.uid).length;
document.getElementById("taskCount").innerText=Object.keys(data.tasks||{}).filter(k=>data.tasks[k].user===user.uid).length;
});

renderDoneEx();
}
});

// Publier
window.publish=function(path,tId,cId){
const title=document.getElementById(tId).value.trim();
const content=document.getElementById(cId).value.trim();
if(!title||!content) return showMessage("Champs vides !",false);
const dataRef=ref(db,`shared/${path}`);
const newItemRef=push(dataRef);
set(newItemRef,{
title:title,
data:content,
user:auth.currentUser.uid,
email:auth.currentUser.email,
time:new Date().toLocaleTimeString()
}).then(()=>{
document.getElementById(tId).value="";
document.getElementById(cId).value="";
showMessage("Partagé !");
}).catch(err=>showMessage(err.message,false));
};

// Supprimer
window.deleteItem=function(path,id){if(confirm("Supprimer ?")) remove(ref(db,`shared/${path}/${id}`));};

// Exercices réalisés
window.markDone=function(exId){
const doneRef=ref(db,`done/${auth.currentUser.uid}/${exId}`);
get(child(ref(db,'shared/ex'),exId)).then(snapshot=>{
if(snapshot.exists()){
set(doneRef,snapshot.val()).then(()=>renderDoneEx());
}
});
};

function renderDoneEx(){
const div=document.getElementById("doneList");
get(ref(db,`done/${auth.currentUser.uid}`)).then(snapshot=>{
const data=snapshot.val()||{};
div.innerHTML="";
Object.keys(data).forEach(key=>{
const item=data[key];
const isLink=item.data.startsWith("http");
const action=isLink?`<a href="${item.data}" target="_blank" class="btn-open">Ouvrir ↗</a>`:`<p style="background:#eee;padding:10px;border-radius:8px;">${item.data}</p>`;
div.innerHTML+=`<div class="card">
<h4>${item.title}</h4>
<small>${item.time||''}</small>
<div>${action}</div>
<div style="text-align:right"><button class="btn-delete" onclick="remove(ref(db,'done/${auth.currentUser.uid}/${key}'))">Supprimer</button></div>
</div>`;
});
});
}

// Affichage liste
function renderList(divId,items,path){
const div=document.getElementById(divId);
div.innerHTML="";
if(!items) return;
Object.keys(items).forEach(key=>{
const item=items[key];
const isLink=item.data.startsWith("http");
const action=isLink?`<a href="${item.data}" target="_blank" class="btn-open">Ouvrir ↗</a>`:`<p style="background:#eee;padding:10px;border-radius:8px;">${item.data}</p>`;

// ✅ Nouveau : bouton Terminé visible pour tous
div.innerHTML+=`<div class="card">
<h4>${item.title}</h4>
<small>Par ${item.email} à ${item.time||''}</small>
<div>${action}</div>
<div style="text-align:right">
<button class="btn-main" onclick="markDone('${key}')">Terminé ✅</button>
${item.user===auth.currentUser.uid?`<button class="btn-delete" onclick="deleteItem('${path}','${key}')">Effacer</button>`:''}
</div>
</div>`;
});
}

// Navigation sections
window.show=function(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
};
</script>
</body>
</html>
