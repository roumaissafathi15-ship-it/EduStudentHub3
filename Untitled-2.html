<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduStudentHub - Plateforme Collaborative</title>
    <style>
        :root { --primary: #667eea; --secondary: #764ba2; --success: #4caf50; --danger: #ff4d4d; --dark: #2d3436; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; text-align: center; min-height: 100vh; padding-bottom: 80px; }
        
        /* Conteneurs */
        .container { max-width: 800px; margin: auto; padding: 20px; }
        #auth-container { background: white; color: #333; padding: 30px; border-radius: 20px; margin: 50px auto; width: 85%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        #dashboard { display: none; }
        .logged-in #dashboard { display: block; }
        .logged-in #auth-container { display: none; }

        /* Formulaires */
        input, select, textarea { padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin: 8px 0; width: 90%; font-size: 16px; }
        button { padding: 12px 25px; border-radius: 25px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; margin: 10px 5px; }
        .btn-main { background: var(--success); color: white; }
        .btn-delete { background: var(--danger); color: white; padding: 5px 12px; font-size: 0.8em; border-radius: 5px; }
        .btn-reset { background: var(--dark); color: white; font-size: 0.7em; margin-top: 20px; }
        
        /* Barre de Recherche */
        .search-box { width: 90%; padding: 15px; border-radius: 30px; border: 2px solid white; background: rgba(255,255,255,0.2); color: white; margin: 20px 0; outline: none; }
        .search-box::placeholder { color: rgba(255,255,255,0.7); }

        /* Cartes de contenu */
        .card { background: white; color: #333; margin: 15px 0; padding: 20px; border-radius: 15px; text-align: left; box-shadow: 0 5px 15px rgba(0,0,0,0.1); animation: fadeIn 0.4s; }
        .card h4 { margin: 0 0 10px 0; color: var(--secondary); border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .card small { color: #888; display: block; margin-bottom: 10px; }
        iframe { border-radius: 8px; border: 1px solid #eee; margin-top: 10px; width: 100%; height: 250px; }

        /* Navigation Basse */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 100; }
        .bottom-nav button { background: none; color: var(--primary); margin: 0; padding: 5px; font-size: 1.2em; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="auth-container">
    <h2 style="margin-top:0;">🔐 EduStudentHub</h2>
    <p>Identifiez-vous pour collaborer.</p>
    <input id="studentName" placeholder="Nom d'utilisateur">
    <input id="studentPass" type="password" placeholder="Mot de passe">
    <button class="btn-main" style="width:100%;" onclick="login()">Se connecter / S'inscrire</button>
</div>

<div id="dashboard" class="container">
    <h2>👋 Bonjour, <span id="nameDisplay"></span> !</h2>

    <input type="text" id="searchInput" class="search-box" onkeyup="filterContent()" placeholder="🔍 Rechercher un document ou exercice...">

    <div class="bottom-nav">
        <button onclick="show('resumeSec')" title="Cours">📚</button>
        <button onclick="show('exSec')" title="Exercices">📝</button>
        <button onclick="show('taskSec')" title="Planning">📅</button>
        <button onclick="show('statsSec')" title="Profil">📊</button>
        <button onclick="logout()" title="Déconnexion" style="color:var(--danger);">🚪</button>
    </div>

    <div id="resumeSec" class="section active">
        <h3>📚 Partager un Cours (PDF)</h3>
        <div class="card" style="background: rgba(255,255,255,0.1); color: white; border: 1px dashed white;">
            <input id="pdfTitle" placeholder="Titre du cours (ex: Data Engineering)">
            <input type="file" id="pdfUpload" accept="application/pdf">
            <button class="btn-main" onclick="addResumePDF()">Publier le PDF</button>
        </div>
        <div id="rList"></div>
    </div>

    <div id="exSec" class="section">
        <h3>📝 Partager un Exercice</h3>
        <div class="card" style="background: rgba(255,255,255,0.1); color: white; border: 1px dashed white;">
            <select id="exType" onchange="toggleExInput()">
                <option value="txt">Énoncé écrit (Texte)</option>
                <option value="pdf">Fichier joint (PDF)</option>
            </select>
            <input id="eTitle" placeholder="Titre de l'exercice">
            <textarea id="eText" rows="4" placeholder="Tapez l'énoncé ici..."></textarea>
            <input id="ePdf" type="file" accept="application/pdf" style="display:none;">
            <button class="btn-main" onclick="addEx()">Publier l'exercice</button>
        </div>
        <div id="eList"></div>
    </div>

    <div id="taskSec" class="section">
        <h3>📅 Planning de la classe</h3>
        <div class="card" style="background: rgba(255,255,255,0.1); color: white; border: 1px dashed white;">
            <input id="tText" placeholder="Événement (ex: Examen final)">
            <input id="tDate" type="date">
            <button class="btn-main" onclick="addTask()">Ajouter au calendrier</button>
        </div>
        <div id="tList"></div>
    </div>

    <div id="statsSec" class="section">
        <h3>📊 Tes Statistiques</h3>
        <div class="card">
            <p>Documents partagés : <strong id="myExCount" style="color:var(--primary);">0</strong></p>
            <p>Tâches créées : <strong id="myTaskCount" style="color:var(--primary);">0</strong></p>
            <hr>
            <p><small>Note : Vous ne pouvez supprimer que vos propres publications.</small></p>
            
            <div style="margin-top:20px; text-align:center;">
                <button class="btn-reset" onclick="hardReset()">⚠️ RÉINITIALISER TOUTE LA BASE</button>
            </div>
        </div>
    </div>
</div>

<script>
// --- INITIALISATION DES DONNÉES ---
let currentUser = localStorage.getItem("currentUser");
let users = JSON.parse(localStorage.getItem("users")) || {};
let shared = JSON.parse(localStorage.getItem("shared")) || { pdfs: [], ex: [], tasks: [] };

if (currentUser) { displayAll(); }

// --- AUTHENTIFICATION ---
function login() {
    const name = document.getElementById("studentName").value.trim();
    const pass = document.getElementById("studentPass").value;
    if (!name || !pass) return alert("Champs requis !");

    if (!users[name]) {
        users[name] = { pass: pass, myTasks: 0, myEx: 0 };
    } else if (users[name].pass !== pass) {
        return alert("Mot de passe incorrect.");
    }

    currentUser = name;
    localStorage.setItem("currentUser", currentUser);
    saveAll();
    displayAll();
}

function logout() {
    localStorage.removeItem("currentUser");
    location.reload();
}

function hardReset() {
    if (confirm("Voulez-vous vraiment TOUT effacer ? Cette action est irréversible.")) {
        localStorage.clear();
        location.reload();
    }
}

// --- NAVIGATION & FILTRE ---
function show(id) {
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    window.scrollTo(0,0);
}

function filterContent() {
    let query = document.getElementById('searchInput').value.toLowerCase();
    let cards = document.querySelectorAll('.section.active .card');
    cards.forEach(card => {
        let title = card.querySelector('h4');
        if (title) {
            card.style.display = title.innerText.toLowerCase().includes(query) ? "" : "none";
        }
    });
}

// --- AJOUT DE CONTENUS ---
function addResumePDF() {
    const file = document.getElementById("pdfUpload").files[0];
    const title = document.getElementById("pdfTitle").value.trim();
    if (!file || !title) return alert("Titre et fichier PDF requis !");
    if (file.size > 1500000) return alert("Fichier trop lourd (max 1.5Mo)");

    const reader = new FileReader();
    reader.onload = function(e) {
        shared.pdfs.unshift({ title, data: e.target.result, user: currentUser });
        users[currentUser].myEx++;
        saveAndRefresh();
        document.getElementById("pdfTitle").value = "";
    };
    reader.readAsDataURL(file);
}

function addEx() {
    const type = document.getElementById("exType").value;
    const title = document.getElementById("eTitle").value.trim();
    if (!title) return alert("Titre manquant !");

    if (type === "txt") {
        const text = document.getElementById("eText").value.trim();
        if (!text) return alert("Écrivez l'énoncé.");
        shared.ex.unshift({ title, type: "txt", data: text, user: currentUser });
    } else {
        const file = document.getElementById("ePdf").files[0];
        if (!file) return alert("Sélectionnez un PDF.");
        const reader = new FileReader();
        reader.onload = function(e) {
            shared.ex.unshift({ title, type: "pdf", data: e.target.result, user: currentUser });
            users[currentUser].myEx++;
            saveAndRefresh();
        };
        reader.readAsDataURL(file);
        return;
    }
    users[currentUser].myEx++;
    saveAndRefresh();
    document.getElementById("eTitle").value = "";
    document.getElementById("eText").value = "";
}

function addTask() {
    const text = document.getElementById("tText").value.trim();
    const date = document.getElementById("tDate").value;
    if (!text || !date) return alert("Infos manquantes.");

    shared.tasks.unshift({ text, date, user: currentUser });
    users[currentUser].myTasks++;
    saveAndRefresh();
    document.getElementById("tText").value = "";
}

// --- SUPPRESSION ---
function deleteItem(category, index) {
    if (confirm("Supprimer ce contenu ?")) {
        const item = shared[category][index];
        // On décrémente les stats de l'utilisateur qui a posté (si le compte existe encore)
        if(users[item.user]) {
            if(category === 'tasks') users[item.user].myTasks--;
            else users[item.user].myEx--;
        }
        shared[category].splice(index, 1);
        saveAndRefresh();
    }
}

// --- RENDU ---
function saveAll() {
    localStorage.setItem("users", JSON.stringify(users));
    localStorage.setItem("shared", JSON.stringify(shared));
}

function saveAndRefresh() {
    saveAll();
    displayAll();
}

function displayAll() {
    document.body.classList.add("logged-in");
    document.getElementById("nameDisplay").innerText = currentUser;

    // Rendu Résumés
    renderList('rList', shared.pdfs, 'pdfs', (item) => `<iframe src="${item.data}"></iframe>`);
    
    // Rendu Exercices
    renderList('eList', shared.ex, 'ex', (item) => 
        item.type === 'pdf' ? `<iframe src="${item.data}"></iframe>` : `<div style="background:#f4f4f4; padding:15px; border-radius:8px; border-left:5px solid var(--primary); font-style:italic;">${item.data}</div>`
    );
    
    // Rendu Planning
    renderList('tList', shared.tasks, 'tasks', (item) => `<p>📅 <strong>${item.date}</strong> — ${item.text}</p>`);

    document.getElementById("myExCount").innerText = users[currentUser].myEx;
    document.getElementById("myTaskCount").innerText = users[currentUser].myTasks;
}

function renderList(elementId, data, category, contentFn) {
    const list = document.getElementById(elementId);
    list.innerHTML = "";
    data.forEach((item, i) => {
        const delBtn = item.user === currentUser ? `<button class="btn-delete" onclick="deleteItem('${category}', ${i})">Supprimer mon post</button>` : "";
        list.innerHTML += `
            <div class="card">
                <h4>${item.title}</h4>
                <small>Par : <strong>${item.user}</strong></small>
                ${contentFn(item)}
                <div style="text-align:right; margin-top:10px;">${delBtn}</div>
            </div>`;
    });
}

function toggleExInput() {
    const type = document.getElementById("exType").value;
    document.getElementById("eText").style.display = type === "txt" ? "block" : "none";
    document.getElementById("ePdf").style.display = type === "pdf" ? "block" : "none";
}
</script>
</body>
</html>
