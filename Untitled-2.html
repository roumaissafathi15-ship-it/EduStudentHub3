<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduStudentHub - Girly</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #f78da7;
  --secondary: #c39bd3;
  --success: #ffb347;
  --danger: #ff6b81;
  --dark: #5d4e6d;
}
body { font-family: 'Poppins', sans-serif; margin:0; background: linear-gradient(135deg, var(--primary), var(--secondary)); color:#fff; text-align:center; min-height:100vh; padding-bottom:80px; }
#auth-container { background:#fff; color:#333; padding:30px; border-radius:30px; margin:50px auto; width:85%; max-width:400px; box-shadow:0 20px 40px rgba(0,0,0,0.2); }
#dashboard { display:none; }
.logged-in #dashboard { display:block; }
.logged-in #auth-container { display:none; }
input, textarea { padding:12px; border-radius:15px; border:1px solid #ddd; margin:8px 0; width:90%; font-size:16px; display:block; margin-left:auto; margin-right:auto; }
button { padding:14px 30px; border-radius:30px; border:none; cursor:pointer; font-weight:bold; transition:0.3s; margin:10px 5px; font-family:'Poppins', sans-serif; }
.btn-main { background: var(--success); color:white; width:95%; box-shadow:0 5px 15px rgba(255,180,180,0.4); }
.btn-delete { background: var(--danger); color:white; padding:6px 14px; font-size:0.85em; border-radius:10px; }
.card { background: rgba(255,255,255,0.15); color:#333; margin:15px 0; padding:20px; border-radius:20px; text-align:left; box-shadow:0 5px 15px rgba(0,0,0,0.1); border-left:5px solid var(--primary); }
.btn-open { display:inline-block; margin-top:10px; background:var(--primary); color:white; font-weight:bold; text-decoration:none; padding:8px 22px; border-radius:25px; box-shadow:0 3px 8px rgba(0,0,0,0.1); }
.bottom-nav { position: fixed; bottom:0; width:100%; background:#fff; display:flex; justify-content:space-around; padding:12px 0; box-shadow:0 -5px 15px rgba(0,0,0,0.1); z-index:100; }
.bottom-nav button { background:none; color:var(--primary); margin:0; padding:5px; font-size:1.6em; }
.section { display:none; }
.section.active { display:block; }
#msg { position: fixed; top:10px; left:50%; transform:translateX(-50%); background: var(--success); color:white; padding:12px 24px; border-radius:20px; display:none; z-index:1000; font-weight:bold; }
.counter { background: rgba(255,255,255,0.2); padding:6px 12px; border-radius:15px; margin:8px; font-weight:bold; }
.chat-box { max-height:300px; overflow-y:auto; background: rgba(255,255,255,0.1); padding:10px; border-radius:15px; }
.chat-message { margin:10px 0; padding:8px 12px; background: rgba(255,255,255,0.3); border-radius:12px; position:relative; word-wrap: break-word; }
.chat-message small { font-size:0.75em; display:block; color:#333; }
.chat-actions { position:absolute; top:5px; right:10px; }
a { color:blue; text-decoration:underline; }
</style>
</head>
<body>

<div id="auth-container">
  <h2>🔐 EduStudentHub 🌸</h2>
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">
  <button class="btn-main" onclick="login()">Se connecter</button>
  <button class="btn-main" onclick="register()">S’inscrire</button>
</div>

<div id="dashboard" class="container">
  <h2>Bonjour, <span id="nameDisplay"></span> 💖</h2>
  <button class="btn-main" style="background:#ff6b81;margin-bottom:10px;" onclick="confirmLogout()">Se déconnecter 🚪</button>

  <div class="counter">
    Résumés 🌸 : <span id="pdfCount">0</span> |
    Exercices 📝 : <span id="exCount">0</span> |
    Tâches 🦋 : <span id="taskCount">0</span>
  </div>

  <div class="bottom-nav">
    <button onclick="show('resumeSec')">📚🌸</button>
    <button onclick="show('exSec')">📝💖</button>
    <button onclick="show('taskSec')">🗂🦋</button>
    <button onclick="show('doneExSec')">✔️🌷</button>
    <button onclick="show('chatSec')">💬🟢</button>
    <button onclick="confirmLogout()" style="color:var(--danger)">🚪</button>
  </div>

  <!-- Sections -->
  <div id="resumeSec" class="section active">
    <h3>📚🌸 Partager un résumé</h3>
    <div class="card" style="background:rgba(255,255,255,0.1);border:1px dashed white;">
      <input id="cTitle" placeholder="Nom du cours">
      <input id="cUrl" placeholder="Lien (http://...)">
      <button class="btn-main" onclick="publish('pdfs','cTitle','cUrl')">Publier 💖</button>
    </div>
    <div id="rList"></div>
  </div>

  <div id="exSec" class="section">
    <h3>📝💖 Exercices et textes</h3>
    <div class="card" style="background:rgba(255,255,255,0.1);border:1px dashed white;">
      <input id="eTitle" placeholder="Titre">
      <textarea id="eContent" placeholder="Énoncé ou lien..."></textarea>
      <button class="btn-main" onclick="publish('ex','eTitle','eContent')">Publier 💖</button>
    </div>
    <div id="eList"></div>
  </div>

  <div id="taskSec" class="section">
    <h3>🗂🦋 Tâches</h3>
    <div class="card" style="background:rgba(255,255,255,0.1);border:1px dashed white;">
      <input id="tTitle" placeholder="Titre">
      <textarea id="tContent" placeholder="Description..."></textarea>
      <button class="btn-main" onclick="publish('tasks','tTitle','tContent')">Publier 💖</button>
    </div>
    <div id="tList"></div>
  </div>

  <div id="doneExSec" class="section">
    <h3>✅🌷 Exercices réalisés</h3>
    <div id="doneList"></div>
  </div>

  <!-- Chat -->
  <div id="chatSec" class="section">
    <h3>💬🟢 Chat en ligne</h3>
    <div class="chat-box" id="chatBox"></div>
    <input id="chatInput" placeholder="Écrire un message...">
    <input id="chatImage" type="file" accept="image/*">
    <button class="btn-main" onclick="sendMessage()">Envoyer 💖</button>
    <button class="btn-main" style="background:#ff6b81;" onclick="clearChat()">Vider discussion</button>
    <div><strong>Utilisateurs en ligne :</strong> <span id="onlineUsers"></span></div>
  </div>
</div>

<div id="msg"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// Config Firebase
const firebaseConfig = {
  apiKey:"AIzaSyBNGA_rCPQRErmQxT4tkvCT0R3DGIPcV-Y",
  authDomain:"edustudenthub.firebaseapp.com",
  projectId:"edustudenthub",
  databaseURL:"https://edustudenthub-default-rtdb.europe-west1.firebasedatabase.app",
  appId:"1:638666895614:web:b566af4aacf05e70fdf5af"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

// Message affichage
function showMessage(text, success=true){
  const msg=document.getElementById("msg");
  msg.innerText=text;
  msg.style.background=success?'var(--success)':'var(--danger)';
  msg.style.display='block';
  setTimeout(()=>msg.style.display='none',2500);
}

// Auth
window.register = function(){
  const email=document.getElementById("email").value.trim();
  const password=document.getElementById("password").value.trim();
  if(!email||!password) return showMessage("Champs vides !",false);
  createUserWithEmailAndPassword(auth,email,password)
    .then(u=>showMessage("Compte créé !"))
    .catch(e=>showMessage(e.message,false));
};
window.login = function(){
  const email=document.getElementById("email").value.trim();
  const password=document.getElementById("password").value.trim();
  if(!email||!password) return showMessage("Champs vides !",false);
  signInWithEmailAndPassword(auth,email,password)
    .catch(e=>showMessage(e.message,false));
};
window.confirmLogout = function(){
  if(confirm("Voulez-vous vraiment vous déconnecter ?")){
    signOut(auth).then(()=>{showMessage("Déconnecté !"); location.reload();})
    .catch(err=>showMessage(err.message,false));
  }
};

// Sections
window.show = function(id){
  const sections=document.querySelectorAll(".section");
  sections.forEach(s=>s.classList.remove("active"));
  const target=document.getElementById(id);
  if(target) target.classList.add("active");
};

// Publish
window.publish=function(path,tId,cId){
  const title=document.getElementById(tId).value.trim();
  const content=document.getElementById(cId).value.trim();
  if(!title||!content) return showMessage("Champs vides !",false);
  const dataRef=ref(db,`shared/${path}`);
  const newItemRef=push(dataRef);
  set(newItemRef,{
    title:title,
    data:content,
    user:auth.currentUser.uid,
    email:auth.currentUser.email,
    time:new Date().toLocaleTimeString()
  }).then(()=>{
    document.getElementById(tId).value="";
    document.getElementById(cId).value="";
    showMessage("Partagé !");
  }).catch(err=>showMessage(err.message,false));
};

// Supprimer message partagé
window.deleteItem = function(path, id){
  if(confirm("Supprimer ?")){
    remove(ref(db, `shared/${path}/${id}`)).then(()=>{
      showMessage("Supprimé !");
    }).catch(err=>showMessage(err.message,false));
  }
};

// Chat : envoyer
window.sendMessage=function(){
  if(!auth.currentUser) return showMessage("Connectez-vous !");
  const input=document.getElementById("chatInput");
  const file=document.getElementById("chatImage").files[0];

  if(file){
    const reader = new FileReader();
    reader.onload = function(e){
      push(ref(db,'chat'),{
        user:auth.currentUser.uid,
        name:auth.currentUser.email.split('@')[0],
        type:'image',
        data:e.target.result,
        time:new Date().toLocaleTimeString()
      });
    }
    reader.readAsDataURL(file);
  } else if(input.value.trim()){
    let msgText = input.value.trim();
    const urlRegex = /(https?:\/\/[^\s]+)/g;
    msgText = msgText.replace(urlRegex, url => `<a href="${url}" target="_blank">${url}</a>`);
    push(ref(db,'chat'),{
      user:auth.currentUser.uid,
      name:auth.currentUser.email.split('@')[0],
      type:'text',
      data:msgText,
      time:new Date().toLocaleTimeString()
    });
  }
  input.value="";
  document.getElementById("chatImage").value="";
};

// Supprimer message individuel
window.deleteChat = function(key){
  if(confirm("Supprimer ce message ?")) remove(ref(db,'chat/'+key));
};

// Vider chat
window.clearChat = function(){
  if(confirm("Vider toute la discussion ?")) remove(ref(db,'chat'));
};

// Render chat
const chatBox = document.getElementById("chatBox");
onValue(ref(db,'chat'), snapshot=>{
  chatBox.innerHTML="";
  const messages = snapshot.val()||{};
  Object.keys(messages).forEach(key=>{
    const m = messages[key];
    let content = m.type==='image'?`<img src="${m.data}" style="max-width:150px;border-radius:8px;">`:m.data;
    chatBox.innerHTML += `
      <div class="chat-message">
        <strong>${m.name}</strong>: ${content}
        <small>${m.time}</small>
        ${m.user===auth.currentUser?.uid?`<div class="chat-actions"><button onclick="deleteChat('${key}')">Supprimer</button></div>`:''}
      </div>`;
  });
  chatBox.scrollTop = chatBox.scrollHeight;
});

// Auth state : dashboard et compte connecté
onAuthStateChanged(auth,user=>{
  if(user){
    document.body.classList.add("logged-in");
    document.getElementById("nameDisplay").innerText=user.email;

    // Compteurs résumés, ex, tâches
    onValue(ref(db,'shared'), snapshot=>{
      const data = snapshot.val()||{pdfs:{},ex:{},tasks:{}};
      document.getElementById("pdfCount").innerText=Object.keys(data.pdfs||{}).filter(k=>data.pdfs[k].user===user.uid).length;
      document.getElementById("exCount").innerText=Object.keys(data.ex||{}).filter(k=>data.ex[k].user===user.uid).length;
      document.getElementById("taskCount").innerText=Object.keys(data.tasks||{}).filter(k=>data.tasks[k].user===user.uid).length;
    });
  }
});
</script>

</body>
</html>
