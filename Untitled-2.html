<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduStudentHub</title>

<style>
body{
  font-family: 'Segoe UI', sans-serif;
  margin:0;
  background: linear-gradient(135deg,#667eea,#764ba2);
  color:white;
  text-align:center;
}
.section{display:none;padding:20px;}
.active{display:block;}

.card{
  background:white;
  color:black;
  margin:10px;
  padding:15px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

button{
  padding:8px 15px;
  border:none;
  border-radius:10px;
  margin:5px;
  cursor:pointer;
  background:#667eea;
  color:white;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
}

input,textarea,select{
  padding:5px;
  margin:5px;
  border-radius:5px;
  border:none;
}
</style>
</head>

<body>

<h2>🔐 Connexion</h2>
<input id="studentName" placeholder="Nom">
<input id="studentPass" type="password" placeholder="Mot de passe">
<button onclick="login()">Entrer</button>

<div id="dashboard">

<h2>👋 <span id="nameDisplay"></span></h2>

<div class="bottom-nav">
<button onclick="show('exSec')">📝 Exercices</button>
<button onclick="show('taskSec')">✅ Tâches</button>
<button onclick="show('statsSec')">📊 Stats</button>
<button onclick="logout()">🚪</button>
</div>

<!-- EXERCICES -->
<div id="exSec" class="section active">
<h3>Exercices</h3>

<input id="searchEx" placeholder="🔍 rechercher" onkeyup="searchEx()">

<select id="exType">
<option value="txt">Texte</option>
<option value="file">Fichier</option>
</select>

<input id="eTitle" placeholder="Titre">
<textarea id="eText"></textarea>
<input type="file" id="eFile">

<button onclick="addEx()">Ajouter</button>

<button onclick="filterMine()">📁 Mes fichiers</button>
<button onclick="displayEx()">🌍 Tous</button>

<div id="eList"></div>
</div>

<!-- TASK -->
<div id="taskSec" class="section">
<h3>Tâches</h3>
<input id="tText">
<input id="tDate" type="date">
<button onclick="addTask()">Ajouter</button>
<ul id="tList"></ul>
</div>

<!-- STATS -->
<div id="statsSec" class="section">
<h3>Stats</h3>

<p>Mes exercices: <span id="myExCount"></span></p>
<p>Réalisés: <span id="myDone"></span></p>

<p>Total ex: <span id="globalEx"></span></p>
<p>Total tâches: <span id="globalTasks"></span></p>

<div style="background:#ddd;border-radius:20px;width:80%;margin:auto;">
<div id="bar" style="height:20px;background:#00ff99;width:0%;border-radius:20px;"></div>
</div>
<p id="progressText"></p>

</div>

</div>

<script>

// DATA
let users = JSON.parse(localStorage.getItem("users")) || {};
let shared = JSON.parse(localStorage.getItem("shared")) || {ex:[],tasks:[]};
let currentUser=null;

// LOGIN
function login(){
let n=studentName.value.trim();
let p=studentPass.value;

if(!n||!p) return alert("remplir");

if(!users[n]) users[n]={pass:p,myEx:[],done:[],tasks:[]};

if(users[n].pass!==p) return alert("wrong");

currentUser=n;
localStorage.setItem("currentUser",n);
displayAll();
}

function logout(){localStorage.clear();location.reload();}

function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// ADD EX
function addEx(){
let type=exType.value;
let title=eTitle.value;
let text=eText.value;
let file=eFile.files[0];

if(!title) return alert("titre");

if(type==="file"){
let reader=new FileReader();
reader.onload=e=>{
shared.ex.push({
title,
type:"file",
data:e.target.result,
fileType:file.type,
user:currentUser
});
save();
displayEx();
};
reader.readAsDataURL(file);
}
else{
shared.ex.push({title,type:"txt",data:text,user:currentUser});
save();
displayEx();
}

users[currentUser].myEx.push(title);
save();
displayStats();
}

// DISPLAY EX
function displayEx(){
eList.innerHTML="";
shared.ex.forEach((ex,i)=>{

let preview="";

if(ex.type==="file"){
if(ex.fileType.startsWith("image")){
preview+=`<img src="${ex.data}" width="100%">`;
}
preview+=`<button onclick="openFile(${i})">📂 ouvrir</button>`;
}else{
preview+=`<p>${ex.data}</p>`;
}

let doneBtn = users[currentUser].done.includes(i) ? "✔" :
`<button onclick="markDone(${i})">✅</button>`;

eList.innerHTML+=`
<div class="card">
<h4>${ex.title} (${ex.user})</h4>
${preview}
${doneBtn}
<button onclick="delEx(${i})">❌</button>
</div>`;
});
}

// OPEN FILE
function openFile(i){
let f=shared.ex[i];
let b=atob(f.data.split(',')[1]);
let arr=new Uint8Array(b.length);

for(let i2=0;i2<b.length;i2++) arr[i2]=b.charCodeAt(i2);

let blob=new Blob([arr],{type:f.fileType});
let url=URL.createObjectURL(blob);
window.open(url);
}

// DONE
function markDone(i){
users[currentUser].done.push(i);
save();
displayEx();
displayStats();
}

// DELETE
function delEx(i){
shared.ex.splice(i,1);
save();
displayEx();
}

// TASKS
function addTask(){
let t=tText.value;
let d=tDate.value;
shared.tasks.push({t,d,user:currentUser});
users[currentUser].tasks.push(t);
save();
displayTasks();
displayStats();
}

function displayTasks(){
tList.innerHTML="";
shared.tasks.forEach((t,i)=>{
tList.innerHTML+=`<li>${t.d} ${t.t} <button onclick="delTask(${i})">❌</button></li>`;
});
}

function delTask(i){
shared.tasks.splice(i,1);
save();
displayTasks();
}

// SEARCH
function searchEx(){
let val=searchEx.value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(val)?"block":"none";
});
}

// FILTER
function filterMine(){
eList.innerHTML="";
shared.ex.forEach((ex,i)=>{
if(ex.user===currentUser){
eList.innerHTML+=`<div class="card"><h4>${ex.title}</h4></div>`;
}
});
}

// STATS
function displayStats(){
myExCount.innerText=users[currentUser].myEx.length;
myDone.innerText=users[currentUser].done.length;
globalEx.innerText=shared.ex.length;
globalTasks.innerText=shared.tasks.length;

let p=Math.round((users[currentUser].done.length/(shared.ex.length||1))*100);
bar.style.width=p+"%";
progressText.innerText=p+"%";
}

// SAVE
function save(){
localStorage.setItem("users",JSON.stringify(users));
localStorage.setItem("shared",JSON.stringify(shared));
}

// INIT
function displayAll(){
nameDisplay.innerText=currentUser;
document.querySelector('h2').style.display='none';
studentName.style.display='none';
studentPass.style.display='none';

displayEx();
displayTasks();
displayStats();
}

if(localStorage.getItem("currentUser")){
currentUser=localStorage.getItem("currentUser");
displayAll();
}

</script>

</body>
</html>
